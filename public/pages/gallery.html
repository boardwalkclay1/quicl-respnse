  <!-- Background Slideshow -->
  <style>
    body {
      background: black;
      position: relative;
      overflow-x: hidden;
    }

    .bg-slideshow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .bg-slideshow img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      animation: fadeBG 36s infinite;
    }

    .bg-slideshow img:nth-child(1) { animation-delay: 0s; }
    .bg-slideshow img:nth-child(2) { animation-delay: 6s; }
    .bg-slideshow img:nth-child(3) { animation-delay: 12s; }
    .bg-slideshow img:nth-child(4) { animation-delay: 18s; }
    .bg-slideshow img:nth-child(5) { animation-delay: 24s; }
    .bg-slideshow img:nth-child(6) { animation-delay: 30s; }

    @keyframes fadeBG {
      0% { opacity: 0; }
      10% { opacity: 1; }
      30% { opacity: 1; }
      40% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* Transparent content blocks */
    section {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 30px;
      margin: 30px auto;
      border-radius: 14px;
      max-width: 1100px;
      color: #f5d98c;
    }

    /* Narrow title blocks */
    h1.hero-title,
    h2 {
      display: inline;
      background: #ffcc00;
      color: #000;
      padding: 0 6px;
      font-weight: 700;
      border-radius: 4px;
    }

    .before-after-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .ba-img {
      width: 100%;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow: 0 0 12px rgba(255,150,0,0.4);
    }
  </style>
</head>
